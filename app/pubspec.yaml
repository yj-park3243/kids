name: app
description: "같이크자 - 우리 아이 또래 친구를 동네에서 쉽게 만나는 육아 모임 플랫폼"
publish_to: 'none'
version: 1.0.5+66

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  awesome_dialog: ^3.2.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.5

  # WebView (KCP 본인인증 form 렌더링)
  webview_flutter: ^4.8.0

  # Social login
  sign_in_with_apple: ^6.1.0
  google_sign_in: ^6.2.1

  # Kakao share
  kakao_flutter_sdk_share: ^1.9.0

  # Deep links
  app_links: ^6.3.0

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  flutter_svg: ^2.0.17

  # Utils
  image_picker: ^1.1.2
  photo_manager: ^3.6.4
  intl: ^0.20.2
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.1

  # Naver Map
  flutter_naver_map: ^1.3.0

  # 현재 위치 — 모임과의 거리 계산
  geolocator: ^13.0.2

  # Google Fonts (for Pretendard-like font)
  google_fonts: ^6.2.1
  socket_io_client: ^3.1.4
  google_mobile_ads: ^7.0.0

  # iOS App Tracking Transparency — IDFA 사용 광고 SDK 정책 준수.
  app_tracking_transparency: ^2.0.6+1

  # 모임 상세 우상단 메뉴 (iOS 스타일 풀다운)
  pull_down_button: ^0.10.2

  # iOS 26 native Liquid Glass tab bar + Cupertino/Material 폴백
  # 0.1.105~0.1.107의 네이티브 탭바 재빌드 로직이 탭 콜백(valueChanged)을 깨뜨려
  # 탭해도 화면이 안 넘어가는 회귀가 있어 match와 동일한 0.1.104로 고정.
  adaptive_platform_ui: 0.1.104

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  path: ^1.9.0
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  freezed: ^3.1.0
  riverpod_generator: ^2.6.5
  custom_lint:
  riverpod_lint:
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FEF9F2"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter_native_splash:
  color: "#FEF9F2"
  image: "assets/icon/icon_foreground.png"
  color_dark: "#FEF9F2"
  android: true
  ios: true
  android_12:
    color: "#FEF9F2"
    image: "assets/icon/icon_foreground.png"
